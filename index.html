<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ameer.AI Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle at top,#0b1228,#050816);
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
text-align:center;
padding:90px 20px;
}

.title{
font-size:62px;
font-weight:900;
letter-spacing:2px;
text-shadow:0 0 25px rgba(79,70,229,0.3);
}

.subtitle{
color:#a1a1aa;
margin-top:10px;
}

/* 3D */
#scene{
height:360px;
}

/* SOCIAL */
.social{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:18px;
padding:40px;
max-width:900px;
margin:auto;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(16px);
padding:16px;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:8px;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(255,255,255,0.06);
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 25px rgba(79,70,229,0.25);
}

/* ICON */
.icon, svg{
width:32px;
height:32px;
}

/* CONTACT */
.contact{
text-align:center;
padding:50px;
}

input,textarea{
width:80%;
max-width:420px;
padding:12px;
margin:6px;
border-radius:10px;
border:none;
outline:none;
background:#0f172a;
color:white;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#4338ca;
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.4);
transform:scale(0);
animation:rippleAnim 0.6s linear;
pointer-events:none;
}

@keyframes rippleAnim{
to{
transform:scale(4);
opacity:0;
}
}

/* MOBILE */
@media(max-width:600px){
.title{font-size:42px;}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="title">Ameer.AI</div>
<div class="subtitle">
Ameer Loai Ali — AI Engineering Student<br>
University of Alshaab, Baghdad
</div>
</div>

<!-- 3D -->
<div id="scene"></div>

<!-- SOCIAL -->
<div class="social">

<div class="card" onclick="openLink('https://instagram.com/dv0am')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<span>Instagram</span>
</div>

<div class="card" onclick="openLink('https://github.com/ameerloay')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733553.png">
<span>GitHub</span>
</div>

<div class="card" onclick="openLink('https://www.tiktok.com/@v1m2')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<span>TikTok</span>
</div>

<div class="card" onclick="openLink('https://www.facebook.com/ameerloai22')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
<span>Facebook</span>
</div>

<div class="card" onclick="openLink('https://t.me/x_87x')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
<span>Telegram</span>
</div>

<div class="card" onclick="openLink('https://discord.com/users/am6f')">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
<span>Discord</span>
</div>

<div class="card" onclick="openLink('https://tellonym.me/c15r')">
<svg viewBox="0 0 24 24" fill="white">
<path d="M12 2C6.5 2 2 5.9 2 10.7c0 3.4 2.3 6.3 5.6 7.6-.2.8-.9 3.3-.9 3.5 0 .2.1.3.3.3.1 0 .2 0 .3-.1.2-.1 3.3-2.2 4-2.7.5.1 1 .1 1.5 .1 5.5 0 10-3.9 10-8.7S17.5 2 12 2z"/>
</svg>
<span>Tellonym</span>
</div>

</div>

<!-- CONTACT -->
<div class="contact">
<h2>Contact Me</h2>

<input placeholder="Name"><br>
<input placeholder="Email"><br>
<textarea placeholder="Message"></textarea><br>

<button>Send Message</button>
</div>

<script>

/* OPEN LINKS */
function openLink(url){
window.open(url,"_blank");
}

/* RIPPLE EFFECT */
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("click",function(e){

const ripple=document.createElement("span");
ripple.classList.add("ripple");

const rect=this.getBoundingClientRect();
ripple.style.left=e.clientX-rect.left+"px";
ripple.style.top=e.clientY-rect.top+"px";

this.appendChild(ripple);

setTimeout(()=>ripple.remove(),600);

});
});

/* 3D TORUS */
const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,window.innerWidth/360,0.1,1000
);

const renderer=new THREE.WebGLRenderer({
alpha:true,
antialias:true
});

renderer.setSize(window.innerWidth,360);
document.getElementById("scene").appendChild(renderer.domElement);

const geometry=new THREE.TorusGeometry(10,3,16,120);

const material=new THREE.MeshStandardMaterial({
color:0x4f46e5,
metalness:0.6,
roughness:0.25
});

const torus=new THREE.Mesh(geometry,material);
scene.add(torus);

const light1=new THREE.PointLight(0x4f46e5,2);
light1.position.set(10,10,10);

const light2=new THREE.PointLight(0xffffff,1);
light2.position.set(-10,-10,10);

scene.add(light1,light2);

camera.position.z=30;

function animate(){
requestAnimationFrame(animate);
torus.rotation.x+=0.005;
torus.rotation.y+=0.008;
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
