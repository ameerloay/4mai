<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ameer.AI </title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#020617,#0b1228,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
overflow-x:hidden;
}

canvas#particles{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-1;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero{
text-align:center;
padding:90px 20px;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);} 
to{opacity:1;transform:translateY(0);} 
}

.title{
font-size:62px;
font-weight:900;
letter-spacing:2px;
background:linear-gradient(90deg,#4f46e5,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #4f46e5;}
to{text-shadow:0 0 25px #22d3ee;}
}

.subtitle{color:#a1a1aa;margin-top:10px;}

#scene{height:360px;}

.social{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:18px;
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(18px);
padding:18px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:8px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.08);
position:relative;
overflow:hidden;
transform-style:preserve-3d;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent);
opacity:0;
transition:0.4s;
}

.card:hover::before{opacity:1;}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 0 30px rgba(79,70,229,0.3);
}

/* SNAPCHAT متناسق */
.card.snapchat{
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
}

/* خلي نفس ستايل بقية الكروت (بدون أصفر) */
.card.snapchat:hover{
box-shadow:0 0 30px rgba(79,70,229,0.3);
transform:translateY(-10px) scale(1.05);
}

.icon, svg{width:34px;height:34px;}

.contact{text-align:center;padding:50px;animation:fadeUp 1.2s ease;}

input,textarea{
width:80%;max-width:420px;padding:12px;margin:6px;border-radius:10px;border:none;outline:none;background:#0f172a;color:white;
}

button{
padding:12px 25px;border:none;border-radius:10px;background:linear-gradient(90deg,#4f46e5,#22d3ee);color:white;font-weight:bold;cursor:pointer;transition:0.3s;
}

button:hover{transform:scale(1.07);filter:brightness(1.2);} 

.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);transform:scale(0);animation:rippleAnim 0.6s linear;pointer-events:none;}

@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

@media(max-width:600px){.title{font-size:42px;}}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">
<div class="title">Ameer.AI</div>
<div class="subtitle">Ameer Loai Ali — AI Engineering Student<br>University of Alshaab, Baghdad</div>
</div>

<div id="scene"></div>

<div class="social">

<div class="card" onclick="openLink('https://instagram.com/dv0am')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"><span>Instagram</span></div>

<div class="card" onclick="openLink('https://github.com/ameerloay')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733553.png"><span>GitHub</span></div>

<div class="card" onclick="openLink('https://www.tiktok.com/@dv0am')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"><span>TikTok</span></div>

<div class="card" onclick="openLink('https://www.facebook.com/ameerloai22')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733547.png"><span>Facebook</span></div>

<div class="card" onclick="openLink('https://t.me/x_87x')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"><span>Telegram</span></div>

<div class="card" onclick="openLink('https://discord.com/users/am6f')"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"><span>Discord</span></div>

<div class="card" onclick="openLink('https://tellonym.me/c15r')"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.5 2 2 5.9 2 10.7c0 3.4 2.3 6.3 5.6 7.6-.2.8-.9 3.3-.9 3.5 0 .2.1.3.3.3.1 0 .2 0 .3-.1.2-.1 3.3-2.2 4-2.7.5.1 1 .1 1.5 .1 5.5 0 10-3.9 10-8.7S17.5 2 12 2z"/></svg><span>Tellonym</span></div>

<div class="card snapchat" onclick="openLink('https://snapchat.com/add/ameerloai22')"><img class="icon" src="https://dl.svgcdn.com/png/streamline-logos/snapchat-logo-800.png"><span>Snapchat</span></div>

</div>

<div class="contact">
<h2>Contact Me</h2>
<input placeholder="Name"><br>
<input placeholder="Email"><br>
<textarea placeholder="Message"></textarea><br>
<button>Send Message</button>
</div>

<script>
function openLink(url){window.open(url,"_blank");}

// ripple
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("click",function(e){
const ripple=document.createElement("span");
ripple.classList.add("ripple");
const rect=this.getBoundingClientRect();
ripple.style.left=e.clientX-rect.left+"px";
ripple.style.top=e.clientY-rect.top+"px";
this.appendChild(ripple);
setTimeout(()=>ripple.remove(),600);
});
});

// 3D tilt
document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('mousemove',e=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const centerX=rect.width/2;
const centerY=rect.height/2;
const rotateX=-(y-centerY)/10;
const rotateY=(x-centerX)/10;
card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});
card.addEventListener('mouseleave',()=>{
card.style.transform='rotateX(0) rotateY(0) scale(1)';
});
});

// particles
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});}

function drawParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='white';
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});
requestAnimationFrame(drawParticles);
}
drawParticles();

// 3D torus
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/360,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});
renderer.setSize(window.innerWidth,360);
document.getElementById("scene").appendChild(renderer.domElement);

const geometry=new THREE.TorusGeometry(10,3,16,120);
const material=new THREE.MeshStandardMaterial({color:0x4f46e5,metalness:0.6,roughness:0.25});
const torus=new THREE.Mesh(geometry,material);
scene.add(torus);

const light1=new THREE.PointLight(0x4f46e5,2);
light1.position.set(10,10,10);
const light2=new THREE.PointLight(0xffffff,1);
light2.position.set(-10,-10,10);
scene.add(light1,light2);

camera.position.z=30;

function animate(){requestAnimationFrame(animate);torus.rotation.x+=0.005;torus.rotation.y+=0.008;renderer.render(scene,camera);}animate();
</script>

</body>
</html>
